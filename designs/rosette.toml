# Development DRC rules for the example designs in this directory.
# User projects get their own rosette.toml via `rosette init`.

[project]
name = "librosette"
version = "0.1.0"

# Note: the output directory is set by the `rosette build -o/--output` flag
# (default: "output/"), not by this config file.

# =============================================================================
# Layer Definitions
# =============================================================================
#
# Named layers with GDS numbers and display properties.
# Access in Python: layers = load_layer_map(); layers.silicon.layer
#
# Per-layer keys:
#   number       - GDS layer number (required)
#   datatype     - GDS datatype (default 0)
#   color        - Hex display color, "#rrggbb" (default "#808080")
#   fill         - Display fill: "solid", "hatched", "crosshatched", "dotted"
#   opacity      - Display opacity, 0.0-1.0 (default 0.7)
#   description  - Free-text label

[layers.silicon]
number = 1
datatype = 0
color = "#ff69b4"
description = "Silicon waveguides"

[layers.oxide]
number = 2
datatype = 0
color = "#4caf50"
description = "Slab / partial etch"

[layers.marker]
number = 3
datatype = 0
color = "#2196f3"
fill = "hatched"
description = "Marker / extent outline (also used for deep-etch trenches)"

[layers.p_doping]
number = 20
datatype = 0
color = "#e91e63"
description = "Doping P+"

[layers.n_doping]
number = 21
datatype = 0
color = "#9c27b0"
description = "Doping N+"

[layers.exclusion]
number = 100
datatype = 0
color = "#ff9800"
fill = "hatched"
description = "Exclusion zone / keep-out"

[layers.text]
number = 10
datatype = 0
color = "#607d8b"
fill = "dotted"
description = "Text annotations"

# =============================================================================
# Design Rule Check (DRC) Constraints
# =============================================================================
#
# Layer keys use semantic names from [layers] above (e.g., [drc.layers.silicon]).
# Numeric "layer/datatype" format (e.g., [drc.layers."1/0"]) also works.
# All dimensions in micrometers (um).
#
# Supported per-layer rules:
#   min_width    - Minimum feature width
#   max_width    - Maximum feature width
#   min_spacing  - Minimum spacing between features on same layer
#   min_area     - Minimum polygon area
#   min_edge_length - Minimum polygon edge length
#   angles       - Allowed edge angles in degrees (e.g., [0, 45, 90, 135])
#   acute_angle  - Minimum allowed convex interior angle (degrees; e.g. 60)
#   no_overlap   - Forbid overlapping polygons on same layer
#   no_self_intersection - Forbid self-intersecting polygons
#   snap_to_grid - Require all vertices to lie on a grid of this pitch (um)
#   density      - Area-fill density window (sub-table; see example below)
#
# Density is a sub-table, e.g.:
#   [drc.layers.silicon.density]
#   min = 0.20            # min fill fraction in each window
#   max = 0.80            # max fill fraction in each window
#   window = 100.0        # window size (um)
#   step = 50.0           # window stride (um; default window/2)
#   region_layer = "..."  # optional: only check inside this layer's polygons
#
# Supported inter-layer rules (in [[drc.rules]] section):
#   enclosure    - Inner layer must be enclosed by outer layer (min_enclosure)
#   spacing      - Minimum spacing between different layers
#   require_overlap - Two layers must overlap
#   forbid_overlap  - Two layers must not overlap
#   not_inside   - Inner layer must not be fully contained inside outer layer
#                  (keep-out / exclusion zone)
#
# Global DRC option:
#   warning_margin - Near-miss margin (um). Geometry within this margin of a
#                    limit is reported as a warning. Set <= 0 to disable.
#                    Put it directly under the [drc] table, e.g.:
#                        [drc]
#                        warning_margin = 0.02
#
# =============================================================================

# -----------------------------------------------------------------------------
# Silicon - Waveguide Core
# -----------------------------------------------------------------------------
[drc.layers.silicon]
min_width = 0.12      # Minimum waveguide width
min_spacing = 0.13    # Minimum spacing between waveguides
min_area = 0.01       # Minimum polygon area
acute_angle = 60      # Min convex interior angle (deg); sharp tips are fab-risky
# angles omitted — all edge angles allowed (curved/all-angle geometry permitted)
no_overlap = true     # Forbid overlapping polygons on same layer

# -----------------------------------------------------------------------------
# Oxide - Slab / Partial Etch
# -----------------------------------------------------------------------------
[drc.layers.oxide]
min_width = 0.18      # Wider minimum for partial etch
min_spacing = 0.20    # Larger spacing requirement
min_area = 0.05       # Minimum slab area

# -----------------------------------------------------------------------------
# Marker - Extent outline / deep etch
# -----------------------------------------------------------------------------
[drc.layers.marker]
min_width = 0.25      # Minimum trench width
min_spacing = 0.30    # Trench-to-trench spacing
min_area = 0.10       # Minimum trench area

# -----------------------------------------------------------------------------
# P+ Doping
# -----------------------------------------------------------------------------
[drc.layers.p_doping]
min_width = 0.30      # Minimum doping width
min_spacing = 0.40    # Doping region spacing
min_area = 0.10       # Minimum doping area

# -----------------------------------------------------------------------------
# N+ Doping
# -----------------------------------------------------------------------------
[drc.layers.n_doping]
min_width = 0.30      # Minimum doping width
min_spacing = 0.40    # Doping region spacing
min_area = 0.10       # Minimum doping area

# -----------------------------------------------------------------------------
# Exclusion Zone / Keep-out
# -----------------------------------------------------------------------------
[drc.layers.exclusion]
min_width = 5.0       # Large exclusion zones
min_spacing = 10.0    # Keep exclusion zones apart
min_area = 25.0       # Minimum exclusion area

# =============================================================================
# Inter-Layer Rules
# =============================================================================
# These define relationships between different layers

[[drc.rules]]
type = "spacing"
layer1 = "p_doping"       # P+ doping
layer2 = "n_doping"       # N+ doping
min_spacing = 0.50        # Doping separation
name = "PN_SPC"

[[drc.rules]]
type = "forbid_overlap"
layer1 = "p_doping"       # P+ doping
layer2 = "n_doping"       # N+ doping
name = "PN_NOOVLP"        # P and N doping cannot overlap

# Silicon must not sit fully inside an exclusion / keep-out zone.
[[drc.rules]]
type = "not_inside"
inner = "silicon"         # feature layer
outer = "exclusion"       # keep-out zone
name = "EXCL_KEEPOUT"

# Other inter-layer rule types (commented examples):
#
# [[drc.rules]]
# type = "enclosure"        # inner must be enclosed by outer with a margin
# inner = "silicon"
# outer = "oxide"
# min_enclosure = 0.10      # required surround (um)
# name = "SI_IN_OX"
#
# [[drc.rules]]
# type = "require_overlap"  # two layers must overlap somewhere
# layer1 = "p_doping"
# layer2 = "silicon"
# name = "DOPE_ON_SI"

# =============================================================================
# DFM (Design for Manufacturability) Prediction
# =============================================================================
#
# Virtual nanofabrication prediction. Rasterizes geometry, applies a
# fabrication model, and compares the predicted result to the design.
#
# Models:
#   gaussian - Approximate proximity effect simulation via Gaussian blur.
#              Useful for catching gross issues (features too narrow, gaps
#              too small) but not a substitute for calibrated models.
#   (PreFab foundry-calibrated models coming soon)
#
# =============================================================================

[dfm]
resolution = 0.01     # Pixel size in um (smaller = more accurate, slower)
padding = 1.0         # Margin around cell bounding box in um
model = "gaussian"    # Prediction model (approximate — PreFab models coming soon)
sigma = 0.08          # Gaussian sigma in um (models lithography proximity blur)
threshold = 0.5       # Binarization threshold (0.0-1.0) — when is a pixel "filled"?
                      #   (alias: contour_threshold; set only one)
layers = ["silicon"]  # Layers to predict (waveguide layer)
# keep_raster = false # Debug: keep intermediate rasters instead of discarding

# Tolerances — deviations beyond these limits are reported as violations.
# Note: the Gaussian model is an approximation. Set tolerances accordingly.
# Foundry-calibrated PreFab models will enable tighter, meaningful limits.
max_area_deviation = 0.10   # relative — max area change (10%)
severity = "warning"        # "warning" to inform, "error" to fail the check

# Per-layer overrides — override model params and tolerances per layer.
# [dfm.layer.silicon]
# sigma = 0.05              # tighter process on waveguide layer
# max_area_deviation = 0.05

# =============================================================================
# Design Checks
# =============================================================================
#
# Unified design checks run by `rosette check`:
# - Connectivity: unconnected ports, width/angle mismatches
# - Bend radius: flags bends below minimum, reports auto-reduced bends
#
# Runs by default with sensible defaults.
# Uncomment and adjust the section below to override defaults.
#
# =============================================================================

# [checks]
# position_tolerance = 0.001   # um — max gap between "connected" ports
# angle_tolerance = 0.1        # degrees — max deviation from anti-parallel
# check_widths = true           # error on width mismatch between connected ports
# min_bend_radius = 5.0        # um — minimum allowed bend radius (omit to skip)
# severity = "error"            # "error" or "warning"
