name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the oldest and newest supported versions (the edges where
        # build/ABI breakage is most likely). 3.12/3.13 are covered by release.
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Build native extension
        run: uv run --python ${{ matrix.python-version }} maturin develop

      - name: Lint
        if: matrix.python-version == '3.11'
        run: uv run ruff check python/

      - name: Check formatting
        if: matrix.python-version == '3.11'
        run: uv run ruff format --check python/

      - name: Type check
        if: matrix.python-version == '3.11'
        run: uv run basedpyright python/rosette

      - name: Test
        run: uv run --python ${{ matrix.python-version }} pytest

  app:
    name: App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: app
        run: bun lint

      - name: Check formatting
        working-directory: app
        run: bun fmt:check

      - name: Type check
        working-directory: app
        run: bun run tsc --noEmit

      - name: Test
        working-directory: app
        run: bun run test

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: astral-sh/setup-uv@v7

      - name: Check API docs coverage
        run: uv run --no-project python www/scripts/check-api-docs.py

      - name: Install dependencies
        working-directory: www
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: www
        run: bun run lint

      - name: Type check
        working-directory: www
        run: bun run types:check

      - name: Build
        working-directory: www
        run: bun run build
