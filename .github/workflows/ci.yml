name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the oldest and newest supported versions (the edges where
        # build/ABI breakage is most likely). 3.12/3.13 are covered by release.
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Build native extension
        run: uv run --python ${{ matrix.python-version }} maturin develop

      - name: Lint
        if: matrix.python-version == '3.11'
        run: uv run ruff check python/

      - name: Check formatting
        if: matrix.python-version == '3.11'
        run: uv run ruff format --check python/

      - name: Type check
        if: matrix.python-version == '3.11'
        run: uv run basedpyright python/rosette

      - name: Test
        run: uv run --python ${{ matrix.python-version }} pytest

  app:
    name: App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # Pin wasm-pack so the regenerated stub matches what other environments
      # produce. The .d.ts member ordering is governed by the wasm-bindgen crate
      # version (pinned via Cargo.lock; deterministic since 0.2.106), and
      # wasm-pack fetches the matching CLI — pinning wasm-pack removes the last
      # unpinned input to the stub-drift check below.
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | VERSION="v0.14.0" sh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      # Rebuild the wasm bindings from the rosette-wasm crate and verify the
      # committed type stub is in sync. The stub (app/src/wasm/rosette_wasm.d.ts)
      # is a checked-in cache for local type-checking; the rest of src/wasm/ is
      # gitignored build output. CI never trusts the cache — it regenerates and
      # fails if the committed stub drifted from the crate's actual public API.
      # The check normalizes the internal InitOutput export table (whose ordering
      # is toolchain-dependent) so pure reordering doesn't false-positive; see
      # scripts/check_wasm_stub.py.
      - name: Save committed wasm type stub
        run: cp app/src/wasm/rosette_wasm.d.ts /tmp/committed_stub.d.ts

      - name: Build wasm bindings
        working-directory: app
        run: bun run build:wasm

      - name: Verify committed wasm type stub is up to date
        run: python3 scripts/check_wasm_stub.py /tmp/committed_stub.d.ts app/src/wasm/rosette_wasm.d.ts

      - name: Lint
        working-directory: app
        run: bun lint

      - name: Check formatting
        working-directory: app
        run: bun fmt:check

      - name: Type check
        working-directory: app
        run: bun run tsc --noEmit

      - name: Test
        working-directory: app
        run: bun run test

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: astral-sh/setup-uv@v7

      - name: Check API docs coverage
        run: uv run --no-project python www/scripts/check-api-docs.py

      - name: Install dependencies
        working-directory: www
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: www
        run: bun run lint

      - name: Type check
        working-directory: www
        run: bun run types:check

      - name: Build
        working-directory: www
        run: bun run build
