name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0, without 'v' prefix)"
        required: true
        type: string

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-arm64-cargo-

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install frontend dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Set version
        run: |
          VERSION="${{ inputs.version }}"

          # Update tauri.conf.json
          cd app/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json

          # Update Cargo.toml (package version only)
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

          # Update app/package.json
          cd ..
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Build Tauri app
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --bundles dmg,updater

      - name: Prepare release assets
        id: assets
        run: |
          VERSION="${{ inputs.version }}"
          BUNDLE_DIR="app/src-tauri/target/release/bundle"

          # DMG for manual download — use a stable name (no version) so
          # the website can link directly to /releases/latest/download/Rosette-aarch64.dmg
          DMG=$(ls ${BUNDLE_DIR}/dmg/*.dmg)
          DMG_NAME="Rosette-aarch64.dmg"
          cp "$DMG" "$DMG_NAME"

          # Updater artifacts (.app.tar.gz and .app.tar.gz.sig)
          UPDATER_TAR=$(ls ${BUNDLE_DIR}/macos/*.app.tar.gz)
          UPDATER_SIG=$(ls ${BUNDLE_DIR}/macos/*.app.tar.gz.sig)

          # Read the signature content for latest.json
          SIGNATURE=$(cat "$UPDATER_SIG")

          # Generate latest.json for the Tauri updater plugin.
          # The updater checks this file to determine if a new version is available.
          cat > latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Rosette Desktop v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/PreFab-Photonics/rosette/releases/download/desktop-v${VERSION}/Rosette.app.tar.gz"
              }
            }
          }
          ENDJSON
          # Strip leading whitespace from heredoc
          sed -i '' 's/^          //' latest.json

          # Copy updater tar.gz with consistent naming
          cp "$UPDATER_TAR" "Rosette.app.tar.gz"

          echo "dmg=${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Rosette-${{ inputs.version }}-aarch64
          path: |
            Rosette-aarch64.dmg
            Rosette.app.tar.gz
            latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="desktop-v${VERSION}"

          cat > release-notes.md <<'EOF'
          ## Installation (macOS Apple Silicon)

          1. Download the `.dmg` file below
          2. Open the DMG and drag Rosette to Applications
          3. On first launch: right-click the app > **Open** (required for unsigned apps)

          Existing users will be prompted to update automatically within the app.

          ## Requirements

          - macOS 15.0 (Sequoia) or later
          - Apple Silicon (M1/M2/M3/M4)
          EOF
          # Strip leading whitespace from heredoc
          sed -i '' 's/^          //' release-notes.md

          gh release create "$TAG" \
            "Rosette-aarch64.dmg" \
            "Rosette.app.tar.gz" \
            "latest.json" \
            --title "Rosette Desktop v${VERSION}" \
            --notes-file release-notes.md \
            --latest
